name: Check course

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install minimum supported Rust
        uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: clippy

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Verify frozen comparative specification
        working-directory: capstones/comparative/spec
        run: sha256sum -c MANIFEST.sha256

      - name: Compile every target on Rust 1.85
        run: cargo check --workspace --all-targets --locked

      - name: Run Clippy on Rust 1.85
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check repository-local Markdown links
        run: python3 scripts/check-markdown-links.py

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Validate locked workspace metadata
        run: cargo metadata --format-version 1 --locked --no-deps > /dev/null

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Compile every target
        run: cargo check --workspace --all-targets --locked

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Test workspace libraries and binaries
        run: |
          cargo test --workspace --lib --bins --locked
          cargo test -p task-manager --locked

      - name: Test capstones
        run: |
          cargo test -p comparative-kv-starter --locked
          cargo test -p comparative-kv-solution --locked
          cargo test -p idiomatic-indexer-starter --locked
          cargo test -p idiomatic-indexer-solution --locked

      - name: Test documentation
        run: cargo test --doc --workspace --locked

      - name: Build API documentation
        run: cargo doc --workspace --no-deps --locked

      - name: Report complete application coverage
        run: |
          cargo llvm-cov -p task-manager --all-targets --summary-only --locked
          cargo llvm-cov -p comparative-kv-solution --all-targets --summary-only --locked
          cargo llvm-cov -p idiomatic-indexer-solution --all-targets --summary-only --locked

      - name: Run lessons and reference solutions
        run: bash scripts/run-course.sh
