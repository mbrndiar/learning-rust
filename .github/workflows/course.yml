name: Check course

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install minimum supported Rust
        uses: dtolnay/rust-toolchain@1.85.0

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Compile every target on Rust 1.85
        run: cargo check --workspace --all-targets

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Compile every target
        run: cargo check --workspace --all-targets

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test workspace libraries and binaries
        run: |
          cargo test --workspace --lib --bins
          cargo test -p task-manager

      - name: Test documentation
        run: cargo test --doc --workspace

      - name: Run lessons and reference solutions
        run: bash scripts/run-course.sh
